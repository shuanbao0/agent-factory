name: HotTopics
options:
  bundleIdPrefix: com.hotapp
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    ENABLE_TESTABILITY: YES
    DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
    CLANG_ENABLE_MODULES: YES
    SWIFT_EMIT_LOC_STRINGS: YES

targets:
  HotTopics:
    type: application
    platform: iOS
    sources:
      - path: src
        excludes:
          - "**/.DS_Store"
          - WidgetExtension/**
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.hotapp.hottopics
        INFOPLIST_KEY_CFBundleDisplayName: 热榜
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.news"
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: UIInterfaceOrientationPortrait
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: >-
          UIInterfaceOrientationPortrait
          UIInterfaceOrientationPortraitUpsideDown
          UIInterfaceOrientationLandscapeLeft
          UIInterfaceOrientationLandscapeRight
    entitlements:
      path: src/HotTopics.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.hotapp.hottopics
    scheme:
      testTargets:
        - HotTopicsTests

  HotTopicsTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: tests
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.hotapp.hottopics.tests
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/HotTopics.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/HotTopics
        BUNDLE_LOADER: $(TEST_HOST)
    dependencies:
      - target: HotTopics

  HotTopicsWidget:
    type: app-extension
    platform: iOS
    sources:
      - path: src/WidgetExtension
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.hotapp.hottopics.widget
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_NSExtensionPointIdentifier: com.apple.widgetkit-extension
    entitlements:
      path: src/HotTopicsWidget.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.hotapp.hottopics
    dependencies:
      - sdk: WidgetKit.framework
      - sdk: SwiftUI.framework
      - sdk: SwiftData.framework
