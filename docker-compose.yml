services:
  agent-factory:
    build: .
    init: true
    ports:
      - "3100:3100"
      - "19100:19100"
    env_file: .env
    environment:
      - NODE_ENV=production
      - AGENT_FACTORY_DIR=/app
    volumes:
      - af-data:/app/data
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3100/api/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    stop_grace_period: 10s

volumes:
  af-data:
